# ============================================================
# Local WSO2 Identity Server - Adaptive Scripting Test Config
# ============================================================
# Edit this file before running tests.
# All values here are passed to JMeter as system properties.

# ---- IS Connection ----
host=localhost
port=9443

# ---- Admin credentials ----
# Base64 encoded (default: admin:admin)
adminCredentials=YWRtaW46YWRtaW4=

# ---- OAuth Application ----
# Create the app once via IS Console:
#   Applications > New Application > Standard Based > OAuth2/OIDC
#   Grant type: Authorization Code
#   Callback URL: https://localhost/callback
#   Then copy the Client ID and Secret below.
clientId=HqfysAhVLVIE4TfX5pAOMGTXAaUa
clientSecret=qKoCdSJu8ud9P1QanRC2pdfeRx7JlXV640eI4pUHrZEa
callbackUrl=https://localhost/callback

# ---- Test User ----
# Used by Adaptive_Script_Login_Flow.jmx (password-only flow).
# The setup script (TestData_Create_Test_User.jmx) creates this user in IS.
testUsername=adaptive_test_user
testPassword=Test@1234!

# ---- Test Execution Parameters ----
concurrency=50
duration=300
rampup=30

# ---- Test Run Tag (for A/B comparison) ----
# Label this test run. Results go to results/<tag>_TIMESTAMP/.
# Use different tags for default vs updated IS packs.
# Example: tag=default  or  tag=updated
tag=updated_50emp_5min_v5

# ---- WSO2 IS Home (for SSL certificate trust) ----
# Path to the IS installation directory.
# Used to locate the truststore for SSL verification.
isHome=/Users/bashitha/Downloads/product/wso2is-7.2.1-SNAPSHOT
